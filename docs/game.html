<!DOCTYPE html>
<html>
	<head>
		<title>Bolder</title>
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Karla:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
		<link href="https://fonts.googleapis.com/css2?family=Rubik+80s+Fade&display=swap" rel="stylesheet">
		<link rel="stylesheet" href="css/bolder.css">
		<script type="text/javascript" src="js/bolder.js"></script>
		<script type="text/javascript" src="js/levels.js"></script>
		<script type="text/javascript" src="js/map.js"></script>
		<script type="text/javascript" src="js/drawloop.js"></script>
		<script type="text/javascript" src="js/random.js"></script>
		<script type="text/javascript" src="js/bob.js"></script>
	</head>
	<body id="-body">
		<div id="-main">
			<div class="toolbar">
				<a id="-home" href="index.html">&lt;&lt; Home</a>
				<span id="-score">score: 0</span>
				<span id="-diamonds">diamonds: 0</span>
				<span id="-monsters">monsters: 0</span>
				<a class="hideOnPause" href="javascript:void(0);" onclick="bolder.stuck()">Stuck?!</a>
				<a class="hideOnPause" href="javascript:void(0);" onclick="bolder.json()">JSON</a>
				<a class="hideOnPause" href="javascript:void(0);" onclick="bolder.map()">Map</a>
				<a class="showOnPause" href="javascript:void(0);" onclick="bolder.map()">Resume</a>
			</div>
			<div id="-border">
				<div id="-viewport">
					<div id="-canvas"></div>
					<div id="-bob" class="bob"></div>
				</div>
			</div>
		</div>
		<div id="-json" style="display:none;"></div>
		<div id="-banner">
			<div id="-level">001</div>
			<div id="-description">collect the diamonds</div>
		</div>
	</body>
	<script>bolder.play()</script>
</html>
