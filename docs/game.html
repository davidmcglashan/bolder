<!DOCTYPE html>
<html>
	<head>
		<title>Bolder</title>
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Karla:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
		<link href="https://fonts.googleapis.com/css2?family=Rubik+80s+Fade&display=swap" rel="stylesheet">
		<link rel="stylesheet" href="css/game.css">
		<script src="http://unpkg.com/tone"></script>
		<script type="text/javascript" src="js/bolder.js"></script>
		<script type="text/javascript" src="js/levels.js"></script>
		<script type="text/javascript" src="js/map.js"></script>
		<script type="text/javascript" src="js/drawloop.js"></script>
		<script type="text/javascript" src="js/random.js"></script>
		<script type="text/javascript" src="js/bob.js"></script>
		<script type="text/javascript" src="js/sound.js"></script>
	</head>
	<body id="-body">
		<div id="-main">
			<div id="-toolbar">
				<a class="border" id="-home" href="index.html">&lt;&lt; Menu</a>
				<div class="status">
					<span id="-score">score: 0</span>
					<span id="-diamonds">diamonds: 0</span>
					<span id="-monsters">monsters: 0</span>
				</div>
				<a class="hideOnPause" href="javascript:void(0);" onclick="bolder.map()">Press 'P' to pause</a>
				<a class="showOnPause" href="javascript:void(0);" onclick="bolder.map()">Resume</a>
			</div>
			<div id="-border">
				<div id="-viewport">
					<div id="-canvas"></div>
					<div id="-bob" class="bob"></div>
				</div>
			</div>
		</div>
		<div id="-json" style="display:none;"></div>
		<div id="-banner">
			<div id="-level">001</div>
			<div id="-description">collect the diamonds</div>
		</div>
		<div class="controls showOnPause">
			<strong>Controls</strong>
			<ul>
				<li><strong>Z</strong> - move left</li>
				<li><strong>X</strong> - move right</li>
				<li><strong>K</strong> - move up</li>
				<li><strong>M</strong> - move down</li>
			</ul>
			<ul>
				<li><strong>P</strong> - pause</li>
				<li><strong>Esc</strong> - kill bob</li>
				<li><strong>R</strong> - restart</li>
			</ul>
			<ul>
				<li><strong>S</strong> - sounds on/off</li>
			</ul>
		</div>
	</body>
	<script>bolder.play()</script>
</html>
